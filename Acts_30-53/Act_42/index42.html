<!DOCTYPE html>

    <title>Ejercicio 42 - Formularios</title>

</head>

<body>
    <h1>Range</h1>
    <form action="https://jsonplaceholder.typicode.com/users" method="post"
        onsubmit="alert('Número seleccionado correctamente.')">
        <label for="number1">Ponga su número de teléfono: </label><br>
        <input type="range" id="number1" name="number1" min="600000000" max="799999999">
        <input type="submit" value="Enviar">
    </form>
</body>

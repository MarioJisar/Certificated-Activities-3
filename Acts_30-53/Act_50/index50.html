<!DOCTYPE html>
<html lang="es-Es">

<head>
    <meta charset="UTF-8">
    <meta name="author" content="@mjs">
    <title>Ejercicio 50 - Formularios</title>
    <link rel="stylesheet" href="../style.css" type="text/css">
</head>

<body>
    <h1>Formulario</h1>

    <form action="https://jsonplaceholder.typicode.com/users" method="post"
        onsubmit="alert('Formulario enviado correctamente.')" id="login">
        <label for="name">Nombre: </label><br>
        <input type="text" id="name" name="name" required><br><br>
        <label for="lastname1">Primer apellido: </label><br>
        <input type="text" id="lastname1" name="lastname1" required><br><br>
        <label for="lastname2">Segundo apellido: </label><br>
        <input type="text" id="lastname2" name="lastname2" required><br><br>
        <input type="submit" value="Enviar (application/x-www-form-urlencoded)" formenctype="application/x-www-form-urlencoded"><br><br>
        <input type="submit" value="Enviar (multipart/form-data)" formenctype="multipart/form-data"><br><br>
        <input type="submit" value="Enviar (text/plain)" formenctype="text/plain"><br><br>
    </form>
</body>

</html>

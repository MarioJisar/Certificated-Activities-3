<!DOCTYPE html>
<html lang="es-Es">

<head>
    <meta charset="UTF-8">
    <meta name="author" content="@mjs">
    <title>Ejercicio 51 - Formularios</title>
</head>

<body
    style="text-align: center; background-image: url(images/paradise.jpg); background-repeat: no-repeat; background-attachment: fixed; background-size: cover; padding: 10px;">
    <h1 style="background-color: rgb(173, 216, 230, 0.65);">Formulario</h1>

    <form action="https://jsonplaceholder.typicode.com/users" method="post"
        onsubmit="alert('Formulario enviado correctamente.')"
        style="background-color: rgb(173, 216, 230, 0.65); padding: 10px;">
        <label for="name">Nombre: </label><br>
        <input type="text" id="name" name="name" required><br><br>
        <label for="lastname1">Primer apellido: </label><br>
        <input type="text" id="lastname1" name="lastname1" required><br><br>
        <label for="lastname2">Segundo apellido: </label><br>
        <input type="text" id="lastname2" name="lastname2" required><br><br>
        <input type="submit" value="Enviar (get)" formmethod="get"><br><br>
        <input type="submit" value="Enviar (post)" formmethod="post"><br><br>
    </form>
</body>

</html>
